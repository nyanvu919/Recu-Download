name: Bug report
description: Create a report to help us improve
body:
  - type: markdown
    attributes:
      value: |
        **ISSUES ARE FOR BUGS AND BROKEN FUNCTIONALITY ONLY**

        For help, questions, or troubleshooting (including "how to" questions, Cloudflare errors, terminal usage, working directory issues, or setup guidance), please use Discussions instead:

        https://github.com/baconator696/Recu-Download/discussions
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm these before submitting
      options:
        - label: I have updated to the latest version of Recu-Download
          required: true
        - label: The issue persists after updating
          required: true
        - label: I have searched existing issues and this is not a duplicate
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the broken behavior (e.g., "Crashes when...", "Fails to download X with error Y").
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Full error output
      description: Copy and paste the complete error message or traceback (as text).
      render: shell
    validations:
      required: true
  - type: markdown
    attributes:
      value: "**System Information**"
  - type: dropdown
    id: os
    attributes:
      label: Operating System Type
      description: Include version if possible
      options:
        - Windows
        - Linux
        - MacOS
    validations:
      required: true
  - type: input
    id: os specifics
    attributes:
      label: Operating System
      description: Include version if possible
      placeholder: e.g., Windows 11, Ubuntu 24.04, macOS 14.5
    validations:
      required: false
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - x64
        - arm64
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Recu-Download Version
      placeholder: e.g., v1.12.0
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant details (network conditions, specific URL/file, screenshots, etc.).
    validations:
      required: false
